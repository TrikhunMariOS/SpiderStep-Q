    func: isaaclab.envs.mdp.terminations:time_out
    params: {}
    time_out: true
  base_contact: null
  bad_orientation:
    func: isaaclab.envs.mdp.terminations:bad_orientation
    params:
      limit_angle: 0.8726646259971648
    time_out: false
curriculum:
  terrain_levels:
